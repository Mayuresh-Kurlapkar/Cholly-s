<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry ❤️</title>
<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .container {
        text-align: center;
        color: #fff;
        animation: fadeIn 2s ease-in-out;
    }

    h1 {
        font-size: 3rem;
        animation: glow 2s infinite alternate;
    }

    p {
        font-size: 1.2rem;
        margin: 20px 0;
    }

    .teddy {
        font-size: 80px;
        animation: float 3s ease-in-out infinite;
    }

    .btn {
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        margin: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .yes {
        background: #ff4b5c;
        color: white;
        box-shadow: 0 0 10px #ff4b5c;
    }

    .yes:hover {
        transform: scale(1.1);
        box-shadow: 0 0 20px #ff4b5c;
    }

    .no {
        background: #fff;
        color: #ff4b5c;
    }

    .no:hover {
        position: absolute;
        top: calc(100% * Math.random());
        left: calc(100% * Math.random());
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }

    @keyframes glow {
        from {text-shadow: 0 0 10px #fff;}
        to {text-shadow: 0 0 20px #ff4b5c;}
    }

    @keyframes float {
        0% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
        100% { transform: translateY(0); }
    }

    .heart {
        position: absolute;
        color: red;
        font-size: 20px;
        animation: rise 5s linear infinite;
    }

    @keyframes rise {
        from {
            transform: translateY(100vh);
            opacity: 1;
        }
        to {
            transform: translateY(-10vh);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div class="container">
    <div class="teddy">🧸❤️</div>
    <h1>I'm Sooooo Sorry my Sweetuuuu, my Baby🥹</h1>
    <p>I Miss you sooooo much my cupcake🥺...<br>
    Your mau loves you sooooooo much😘🤍<br>
    Please forgive me 🙏</p>

    <button class="btn yes" onclick="forgive()">Forgive Me 🤍</button>
    <button class="btn no" onmouseover="moveButton(this)">No 😢</button>
</div>

<script>
function forgive() {
    alert("Yay! Thank you for forgiving me ❤️🥰");
}

function moveButton(btn) {
    btn.style.position = "absolute";
    btn.style.top = Math.random() * window.innerHeight + "px";
    btn.style.left = Math.random() * window.innerWidth + "px";
}

// floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
